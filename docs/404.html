<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      /* GitHub Pages has no server rewrites; 404.html maps pretty paths to .html files.
         build-static.js sets __TAROT_404_BASE__ to your repo path, e.g. "/streamgame". */
      window.__TAROT_404_BASE__ = "";
    </script>
    <script>
      (function () {
        var base = String(window.__TAROT_404_BASE__ || "").replace(/\/+$/, "");
        var path = location.pathname;
        if (base && path.indexOf(base) === 0) {
          path = path.slice(base.length) || "/";
        }
        var map = {
          "/library": "/library.html",
          "/control": "/control.html",
          "/spread/yesno": "/spread-yesno.html",
          "/spread/two-card": "/spread-two-card.html",
          "/spread/past-present-future": "/spread-past-present-future.html",
          "/spread/path-of-five": "/spread-path-of-five.html",
          "/spread/celtic-seven": "/spread-celtic-seven.html",
          "/spread/equilibrium": "/spread-equilibrium.html",
        };
        var target = map[path];
        var prefix = base || "";
        if (target) {
          location.replace(location.origin + prefix + target + location.search + location.hash);
        } else if (path !== "/" && path !== "/index.html") {
          location.replace(location.origin + prefix + "/index.html" + location.search + location.hash);
        }
      })();
    </script>
  </head>
  <body style="margin: 0; min-height: 100vh; background: radial-gradient(120% 80% at 50% 0%, #1a2e2e 0%, #121f1f 45%, #0b1214 100%); color: #adff2f; font-family: system-ui, sans-serif;">
    <p style="padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) 1rem max(1rem, env(safe-area-inset-left)); text-shadow: 0 0 12px rgba(57, 255, 20, 0.4)">Redirecting…</p>
  </body>
</html>
